<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Portfolio | Expert Power BI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .aspect-video-pbi { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; }
        .aspect-video-pbi iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .project-card:hover { transform: translateY(-5px); transition: all 0.3s ease; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                Data Specialist Portfolio
            </span>
            <div class="space-x-6 text-sm font-medium text-slate-600 uppercase tracking-widest">
                <a href="#projects" class="hover:text-blue-600">Projets</a>
                <a href="#" class="hover:text-blue-600">CV</a>
            </div>
        </div>
    </nav>

    <header class="py-16 px-6 bg-slate-900 text-white">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-5xl font-extrabold mb-4 tracking-tight">Transformer la donnée en <span class="text-blue-400">décisions.</span></h1>
            <p class="text-xl text-slate-400 mb-8 max-w-2xl mx-auto">Expert en Business Intelligence & Data Automation. Candidat Master en Gestion de Projet.</p>
            <div class="flex justify-center gap-4">
                <span class="px-4 py-2 bg-slate-800 rounded-full text-sm border border-slate-700"><i class="fas fa-chart-line mr-2 text-blue-400"></i>Power BI</span>
                <span class="px-4 py-2 bg-slate-800 rounded-full text-sm border border-slate-700"><i class="fab fa-python mr-2 text-yellow-400"></i>Python</span>
                <span class="px-4 py-2 bg-slate-800 rounded-full text-sm border border-slate-700"><i class="fas fa-database mr-2 text-green-400"></i>SQL</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">

        <div id="projects" class="mb-16 text-center">
            <h2 class="text-3xl font-bold mb-8">Mes Réalisations</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <button onclick="changeReport('https://app.powerbi.com/view?r=eyJrIjoiYTc5NTAxMWEtYWYwNC00NjE3LWJiZDAtMThjOTJmZWI5N2I3IiwidCI6IjkwYzcwYWNkLWZhZWEtNDYwYS04OTM5LTYyYmFlYTI3ZDYyOSJ9', 'Analyse Financière Globale')" 
                        class="project-card text-left bg-white p-6 rounded-2xl border-2 border-transparent shadow-sm">
                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4 text-xl">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-2 text-slate-800">Analyse Financière</h3>
                    <p class="text-sm text-slate-500">Suivi du CA, Marge brute et indicateurs de performance clés.</p>
                </button>

                <button onclick="alert('Rapport bientôt disponible !')" 
                        class="project-card text-left bg-white p-6 rounded-2xl border-2 border-transparent shadow-sm opacity-60">
                    <div class="w-12 h-12 bg-green-100 text-green-600 rounded-lg flex items-center justify-center mb-4 text-xl">
                        <i class="fas fa-users"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-2 text-slate-800">Projet FasoJob</h3>
                    <p class="text-sm text-slate-500">Automatisation du recrutement et matching par IA.</p>
                </button>

                <button onclick="alert('Rapport bientôt disponible !')" 
                        class="project-card text-left bg-white p-6 rounded-2xl border-2 border-transparent shadow-sm opacity-60">
                    <div class="w-12 h-12 bg-purple-100 text-purple-600 rounded-lg flex items-center justify-center mb-4 text-xl">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <h3 class="font-bold text-lg mb-2 text-slate-800">Projet PONASI</h3>
                    <p class="text-sm text-slate-500">Suivi-Évaluation (M&E) des indicateurs environnementaux.</p>
                </button>

            </div>
        </div>

        <section id="viewer" class="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="px-8 py-6 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                <h2 id="report-title" class="text-xl font-bold text-slate-700 italic">Analyse Financière Globale</h2>
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-400"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
            </div>
            <div class="p-4">
                <div class="aspect-video-pbi bg-slate-100">
                    <iframe id="main-iframe" src="https://app.powerbi.com/view?r=eyJrIjoiYTc5NTAxMWEtYWYwNC00NjE3LWJiZDAtMThjOTJmZWI5N2I3IiwidCI6IjkwYzcwYWNkLWZhZWEtNDYwYS04OTM5LTYyYmFlYTI3ZDYyOSJ9" allowFullScreen="true"></iframe>
                </div>
            </div>
        </section>

    </main>

    <footer class="text-center py-12 text-slate-400 text-sm">
        <p>&copy; 2026 - Portfolio Data Expert - Burkina Faso</p>
    </footer>

    <script>
        function changeReport(url, title) {
            document.getElementById('main-iframe').src = url;
            document.getElementById('report-title').innerText = title;
            // Scroll fluide vers le visualiseur
            document.getElementById('viewer').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
